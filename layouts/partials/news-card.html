<div class="col">
  <div class="card h-100 border-0 shadow-sm">
    {{ with .image }}
      <div class="px-3 pt-3">
        <div class="rounded border bg-light d-flex align-items-center justify-content-center overflow-hidden" style="height: 140px;">
          <img
            src="{{ . }}"
            alt="{{ $.title }} preview"
            class="img-fluid w-100 h-100"
            loading="lazy"
            style="object-fit: contain;"
          >
        </div>
      </div>
    {{ end }}
    <div class="card-body d-flex flex-column">
      <div class="d-flex flex-wrap gap-2 mb-3">
        <span class="badge rounded-pill text-bg-light border">{{ .kind }}</span>
        {{ with .source }}
          <span class="badge rounded-pill text-bg-light border">{{ . }}</span>
        {{ end }}
      </div>

      <h3 class="h4 card-title">
        <a
          href="{{ .url }}"
          class="stretched-link text-primary text-decoration-none"
          {{ if .external }}target="_blank" rel="noopener"{{ end }}
        >
          {{ .title }}
        </a>
      </h3>

      {{ with .dateDisplay }}
        <p class="text-muted small mb-3">{{ . }}</p>
      {{ end }}

      {{ with .description }}
        <p class="card-text">{{ . }}</p>
      {{ end }}

      <div class="mt-auto pt-2">
        <span class="text-primary">
          {{ .cta }}
          {{ if .external }} ->{{ end }}
        </span>
      </div>
    </div>
  </div>
</div>
