- id: bitbox02
  slug: bitbox02
  slugimage: bitbox02
  name:
    en: BitBox02 / BitBox02 Nova
  summary_points:
    en:
    - Signer with touch sensors and microSD backups.
    - Requires the BitBoxApp for setup and supports multisig account registration.
    es:
    - Dispositivo de firma con sensores táctiles y copias de seguridad en microSD.
    - Requiere BitBoxApp para la configuración y admite el registro de cuentas multifirma.
    fr:
    - Signataire avec capteurs tactiles et sauvegardes sur microSD.
    - Nécessite BitBoxApp pour la configuration et prend en charge l’enregistrement
      des comptes multisig.
    de:
    - Signer mit Berührungssensoren und microSD-Backups.
    - Benötigt die BitBoxApp für die Einrichtung und unterstützt die Registrierung
      von Multisig-Konten.
    it:
    - Signer con sensori touch e backup su microSD.
    - Richiede BitBoxApp per la configurazione e supporta la registrazione di account
      multisig.
    pt:
    - Dispositivo de assinatura com sensores táteis e cópias de segurança em microSD.
    - Requer a BitBoxApp para a configuração e suporta o registo de contas multisig.
    pl:
    - Podpisywacz z czujnikami dotykowymi i kopiami zapasowymi na microSD.
    - Wymaga BitBoxApp do konfiguracji i obsługuje rejestrację kont multisig.
    tr:
    - Dokunmatik sensörlü ve microSD yedeklemeli imzalayıcı.
    - Kurulum için BitBoxApp gerekir ve multisig hesap kaydını destekler.
    id:
    - Penanda tangan dengan sensor sentuh dan cadangan microSD.
    - Memerlukan BitBoxApp untuk penyiapan dan mendukung pendaftaran akun multisig.
    ca:
    - Signador amb sensors tàctils i còpies de seguretat a microSD.
    - Requereix BitBoxApp per a la configuració i admet el registre de comptes multifirma.
    ru:
    - Устройство подписи с сенсорными датчиками и резервными копиями на microSD.
    - Для настройки требуется BitBoxApp, поддерживается регистрация multisig-аккаунтов.
    uk:
    - Підписувач із сенсорними датчиками та резервними копіями на microSD.
    - Потребує BitBoxApp для налаштування та підтримує реєстрацію multisig-акаунтів.
    zh:
    - 带触摸传感器和 microSD 备份的签名设备。
    - 需要 BitBoxApp 完成设置，并支持多签账户注册。
    ja:
    - タッチセンサーと microSD バックアップを備えた署名デバイス。
    - 設定には BitBoxApp が必要で、マルチシグアカウントの登録に対応します。
    ko:
    - 터치 센서와 microSD 백업을 갖춘 서명 장치.
    - 설정에는 BitBoxApp이 필요하며 멀티시그 계정 등록을 지원합니다.
    hi:
    - टच सेंसर और microSD बैकअप वाला साइनर।
    - सेटअप के लिए BitBoxApp चाहिए और मल्टीसिग खाते के पंजीकरण का समर्थन करता है।
    th:
    - อุปกรณ์ลงนามพร้อมเซ็นเซอร์สัมผัสและการสำรองข้อมูลบน microSD
    - ต้องใช้ BitBoxApp สำหรับการตั้งค่าและรองรับการลงทะเบียนบัญชี multisig
    ar:
    - جهاز توقيع مع حساسات لمس ونسخ احتياطية على microSD.
    - يتطلب BitBoxApp للإعداد ويدعم تسجيل حسابات التوقيع المتعدد.
    fa:
    - امضاکننده با حسگرهای لمسی و نسخه پشتیبان microSD.
    - برای راه‌اندازی به BitBoxApp نیاز دارد و از ثبت حساب چندامضایی پشتیبانی می‌کند.
    my:
    - touch sensor များနှင့် microSD backup များပါသော signer ဖြစ်သည်။
    - setup အတွက် BitBoxApp လိုအပ်ပြီး multisig account registration ကို ထောက်ပံ့သည်။
  summary:
