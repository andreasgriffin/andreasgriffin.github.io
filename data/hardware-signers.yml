    - ทำงานกับ Bitcoin-Safe ได้โดยไม่ต้องใช้แอปของผู้ผลิต
    ar:
    - جهاز توقيع DIY للأجهزة الجاهزة.
    - يمكنه تسجيل وحفظ نصاب التوقيع المتعدد للتحقق من العناوين.
    - يعمل مع Bitcoin-Safe دون تطبيق من الشركة المصنعة.
    fa:
    - امضاکننده DIY برای سخت‌افزار آماده.
    - می‌تواند نصاب‌های چندامضایی را برای تأیید آدرس ثبت و ذخیره کند.
    - بدون اپ سازنده با Bitcoin-Safe کار می‌کند.
    my:
    - ready-made hardware အတွက် DIY signer ဖြစ်သည်။
    - address verification အတွက် multisig quorum များကို register လုပ်ပြီး သိမ်းဆည်းနိုင်သည်။
    - ထုတ်လုပ်သူ app မလိုဘဲ Bitcoin-Safe နှင့် အလုပ်လုပ်သည်။
  summary:
    en: DIY signer for off-the-shelf hardware; can register and save multisig quorums
      for address verification and works with Bitcoin-Safe without a vendor app.
