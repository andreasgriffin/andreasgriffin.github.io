signers:
- id: coldcard-q
  slug: coldcard-q
  slugimage: q
  name:
    en: Coldcard Q
  summary_points:
    en:
    - Large-screen Bitcoin-only signer with a full keyboard.
    - Stores multisig wallet details on-device.
    - Works with Bitcoin-Safe without a vendor app.
    es:
    - Dispositivo de firma solo para Bitcoin con pantalla grande y teclado completo.
    - Guarda los datos de la billetera multifirma en el dispositivo.
    - Funciona con Bitcoin-Safe sin una app del fabricante.
    fr:
    - Signataire Bitcoin uniquement avec grand écran et clavier complet.
    - Stocke les détails du portefeuille multisig sur l’appareil.
    - Fonctionne avec Bitcoin-Safe sans application du fabricant.
    de:
    - Bitcoin-Only-Signer mit großem Bildschirm und vollständiger Tastatur.
    - Speichert Multisig-Wallet-Daten auf dem Gerät.
    - Funktioniert mit Bitcoin-Safe ohne Hersteller-App.
    it:
    - Signer solo Bitcoin con schermo grande e tastiera completa.
    - Memorizza i dettagli del wallet multisig sul dispositivo.
    - Funziona con Bitcoin-Safe senza un’app del produttore.
    pt:
    - Dispositivo de assinatura apenas Bitcoin com ecrã grande e teclado completo.
    - Guarda os dados da carteira multisig no dispositivo.
    - Funciona com o Bitcoin-Safe sem uma aplicação do fabricante.
    pl:
    - Podpisywacz tylko do Bitcoina z dużym ekranem i pełną klawiaturą.
    - Przechowuje dane portfela multisig na urządzeniu.
    - Działa z Bitcoin-Safe bez aplikacji producenta.
    tr:
    - Tam klavyeli, büyük ekranlı, sadece Bitcoin için imzalayıcı.
    - Multisig cüzdan bilgilerini cihazda saklar.
    - Bir üretici uygulaması olmadan Bitcoin-Safe ile çalışır.
    id:
    - Penanda tangan khusus Bitcoin dengan layar besar dan papan tombol lengkap.
    - Menyimpan detail dompet multisig di perangkat.
    - Bekerja dengan Bitcoin-Safe tanpa aplikasi vendor.
    ca:
    - Signador només de Bitcoin amb pantalla gran i teclat complet.
    - Desa els detalls de la cartera multifirma al dispositiu.
    - Funciona amb Bitcoin-Safe sense una aplicació del fabricant.
    ru:
    - Устройство подписи только для Bitcoin с большим экраном и полноценной клавиатурой.
    - Хранит данные multisig-кошелька на устройстве.
    - Работает с Bitcoin-Safe без приложения производителя.
    uk:
    - Підписувач лише для Bitcoin з великим екраном і повною клавіатурою.
    - Зберігає дані multisig-гаманця на пристрої.
    - Працює з Bitcoin-Safe без застосунку виробника.
    zh:
    - 仅支持比特币的签名设备，配有大屏幕和全键盘。
    - 在设备上保存多签钱包信息。
    - 无需厂商应用即可配合 Bitcoin-Safe 使用。
    ja:
    - 大型画面とフルキーボードを備えた Bitcoin 専用署名デバイス。
    - マルチシグウォレット情報をデバイス上に保存します。
    - ベンダーアプリなしで Bitcoin-Safe と使えます。
    ko:
    - 큰 화면과 전체 키보드를 갖춘 비트코인 전용 서명 장치.
    - 멀티시그 지갑 정보를 장치에 저장합니다.
    - 제조사 앱 없이 Bitcoin-Safe와 함께 사용할 수 있습니다.
    hi:
    - बड़ी स्क्रीन और पूरे कीबोर्ड वाला केवल बिटकॉइन साइनर।
    - मल्टीसिग वॉलेट का विवरण डिवाइस पर संग्रहीत करता है।
    - निर्माता ऐप के बिना Bitcoin-Safe के साथ काम करता है।
    th:
    - อุปกรณ์ลงนามเฉพาะ Bitcoin พร้อมหน้าจอขนาดใหญ่และแป้นพิมพ์เต็มรูปแบบ
    - เก็บข้อมูลกระเป๋า multisig ไว้บนอุปกรณ์
    - ทำงานกับ Bitcoin-Safe ได้โดยไม่ต้องใช้แอปของผู้ผลิต
    ar:
    - جهاز توقيع مخصص لبيتكوين فقط بشاشة كبيرة ولوحة مفاتيح كاملة.
    - يخزن تفاصيل محفظة التوقيع المتعدد على الجهاز.
    - يعمل مع Bitcoin-Safe دون تطبيق من الشركة المصنعة.
    fa:
    - امضاکننده مخصوص بیت‌کوین با نمایشگر بزرگ و صفحه‌کلید کامل.
    - جزئیات کیف پول چندامضایی را روی دستگاه ذخیره می‌کند.
    - بدون اپ سازنده با Bitcoin-Safe کار می‌کند.
    my:
    - မျက်နှာပြင်ကြီးပြီး ကီးဘုတ်အပြည့်ပါသော Bitcoin သီးသန့် signer ဖြစ်သည်။
    - multisig wallet အချက်အလက်များကို စက်ပေါ်တွင် သိမ်းဆည်းသည်။
    - ထုတ်လုပ်သူ app မလိုဘဲ Bitcoin-Safe နှင့် အလုပ်လုပ်သည်။
  summary:
    en: Large-screen Bitcoin-only signer with a full keyboard; stores multisig wallet
      details on-device and works with Bitcoin-Safe without a vendor app.
  image: https://raw.githubusercontent.com/thebitcoinhole/database/refs/heads/master/item-types/hardware-wallets/img/coldcard-q-thumb.webp
  shop_url: https://store.coinkite.com/promo/8BFF877000C34A86F410
  discount:
    code: 8BFF877000C34A86F410
    note:
      en: Promo automatically applied at Coinkite.
  features:
    usb: true
    qr: true
    sd: true
  bitcoin_only: true
